<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Dice Roll</title>

    <style>
        body {
            margin: 0;
        }

        canvas {
            display: block;
        }

        #buttonContainer button {
            border: none;
            background: transparent;
            cursor: pointer;
        }

        #buttonContainer img {
            width: clamp(35px, 14vmin, 80px);
            height: clamp(35px, 14vmin, 80px);
        }

        #buttonContainer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(6px, 1.2vw, 12px);
            z-index: 10;
            flex-wrap: nowrap;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="buttonContainer">
        <button id="plusBtn"><img src="images/plus.png" alt="Plus"></button>
        <button id="minusBtn"><img src="images/minus.png" alt="Minus"></button>
        <button id="playBtn"><img src="images/play.png" alt="Play"></button>
        <button id="stopBtn"><img src="images/stop.png" alt="Stop"></button>
        <button id="spinBtn"><img src="images/spin.png" alt="Spin"></button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        /////////////////////////////
        // Scene Setup
        /////////////////////////////

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 1, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.physicallyCorrectLights = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 2;
        document.body.appendChild(renderer.domElement);

        /////////////////////////////
        // Lighting
        /////////////////////////////

        const ambientLight = new THREE.AmbientLight(0xffffff, 2);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        const fillLight = new THREE.PointLight(0xffffff, 1.5);
        fillLight.position.set(-5, 5, 5);
        scene.add(fillLight);

        /////////////////////////////
        // Environment Reflection
        /////////////////////////////

        const textureLoader = new THREE.TextureLoader();
        textureLoader.load("images/bg.jpg", function (texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
            scene.background = new THREE.Color(0x000000);
        });

        /////////////////////////////
        // Load Model
        /////////////////////////////

        let model;
        const loader = new THREE.GLTFLoader();

        loader.load("blender/metallicCube_pwa.glb", function (gltf) {
            model = gltf.scene;

            model.traverse(child => {
                if (child.isMesh) {
                    child.material.envMap = scene.environment;
                    child.material.metalness = 1;
                    child.material.roughness = 0.2;
                    child.material.needsUpdate = true;
                }
            });

            model.position.set(0, 1, 0);
            scene.add(model);
        });

        /////////////////////////////
        // Rotation System
        /////////////////////////////

        let isRotating = true;
        let frozenRotation = false;
        let lastRotation = new THREE.Euler();
        let rotationSpeedMultiplier = 0.5;
        const MAX_MULTIPLIER = 2.48;
        const MIN_MULTIPLIER = 0.1;

        /////////////////////////////
        // Dice Roll System
        /////////////////////////////

        let isRolling = false;
        let rollStart = 0;
        let rollDuration = 2.5;
        let startRotation = new THREE.Euler();
        let targetRotation = new THREE.Euler();
        let wobble = false;
        let wobbleTime = 0;

        const diceFaces = [
            { x: 0, y: 0, z: 0 },
            { x: 0, y: Math.PI / 2, z: 0 },
            { x: 0, y: Math.PI, z: 0 },
            { x: 0, y: -Math.PI / 2, z: 0 },
            { x: -Math.PI / 2, y: 0, z: 0 },
            { x: Math.PI / 2, y: 0, z: 0 }
        ];

        /////////////////////////////
        // Animation Loop
        /////////////////////////////

        let previousTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - previousTime) / 1000;
            previousTime = now;

            if (model && isRolling) {
                let elapsed = (now - rollStart) / 1000;
                let progress = elapsed / rollDuration;

                if (progress >= 1) {
                    progress = 1;
                    isRolling = false;
                    wobble = true;
                    wobbleTime = 0;

                    model.rotation.set(
                        targetRotation.x,
                        targetRotation.y,
                        targetRotation.z
                    );

                    lastRotation.copy(targetRotation);
                }

                const ease = 1 - Math.pow(1 - progress, 3);

                model.rotation.x = startRotation.x + (targetRotation.x - startRotation.x) * ease;
                model.rotation.y = startRotation.y + (targetRotation.y - startRotation.y) * ease;
                model.rotation.z = startRotation.z + (targetRotation.z - startRotation.z) * ease;
            } else if (model && wobble) {
                wobbleTime += delta;
                model.rotation.x += Math.sin(wobbleTime * 20) * 0.2 * delta;
                model.rotation.y += Math.sin(wobbleTime * 15) * 0.2 * delta;

                if (wobbleTime > 0.4) {
                    wobble = false;
                    frozenRotation = true;
                }
            } else if (model && isRotating && !frozenRotation) {
                const speed = 1 * rotationSpeedMultiplier;
                model.rotation.x += speed * delta;
                model.rotation.y += speed * delta;
            }

            renderer.render(scene, camera);
        }

        animate();

        /////////////////////////////
        // Button Controls
        /////////////////////////////

        const playBtn = document.getElementById("playBtn");
        const stopBtn = document.getElementById("stopBtn");
        const spinBtn = document.getElementById("spinBtn");
        const plusBtn = document.getElementById("plusBtn");
        const minusBtn = document.getElementById("minusBtn");

        function updateButtonImages() {
            plusBtn.querySelector("img").src =
                rotationSpeedMultiplier >= MAX_MULTIPLIER ? "images/plus_max.png" : "images/plus.png";
            minusBtn.querySelector("img").src =
                rotationSpeedMultiplier <= MIN_MULTIPLIER ? "images/minus_max.png" : "images/minus.png";
        }

        playBtn.addEventListener("click", () => {
            if (!model) return;
            frozenRotation = false;
            isRotating = true;
        });

        stopBtn.addEventListener("click", () => {
            if (!model) return;
            lastRotation.copy(model.rotation);
            frozenRotation = true;
            isRotating = false;
        });

        spinBtn.addEventListener("click", () => {
            if (!model) return;

            isRotating = false;
            frozenRotation = false;

            const face = diceFaces[Math.floor(Math.random() * diceFaces.length)];
            startRotation.copy(model.rotation);

            const spinsX = 2 + Math.floor(Math.random() * 2);
            const spinsY = 2 + Math.floor(Math.random() * 2);

            targetRotation.set(
                face.x + spinsX * Math.PI * 2,
                face.y + spinsY * Math.PI * 2,
                face.z
            );

            rollStart = performance.now();
            rollDuration = 4;
            isRolling = true;
        });

        plusBtn.addEventListener("click", () => {
            if (rotationSpeedMultiplier < MAX_MULTIPLIER) {
                rotationSpeedMultiplier *= 1.2;
                if (rotationSpeedMultiplier > MAX_MULTIPLIER) rotationSpeedMultiplier = MAX_MULTIPLIER;
            }
            updateButtonImages();
        });

        minusBtn.addEventListener("click", () => {
            if (rotationSpeedMultiplier > MIN_MULTIPLIER) {
                rotationSpeedMultiplier /= 1.2;
                if (rotationSpeedMultiplier < MIN_MULTIPLIER) rotationSpeedMultiplier = MIN_MULTIPLIER;
            }
            updateButtonImages();
        });

        /////////////////////////////
        // Mouse Drag Controls
        /////////////////////////////

        let mouseDown = false;
        let lastX = 0;
        let lastY = 0;

        function startDrag(e) {
            if (frozenRotation) {
                mouseDown = true;
                lastX = e.clientX || e.touches[0].clientX;
                lastY = e.clientY || e.touches[0].clientY;
            }
        }

        function moveRotation(e) {
            if (mouseDown && model) {
                const x = e.clientX || e.touches[0].clientX;
                const y = e.clientY || e.touches[0].clientY;

                const dx = x - lastX;
                const dy = y - lastY;

                model.rotation.y += dx * 0.005;
                model.rotation.x += dy * 0.005;

                lastX = x;
                lastY = y;
            }
        }

        function stopRotation() {
            mouseDown = false;
        }

        renderer.domElement.addEventListener("mousedown", startDrag);
        renderer.domElement.addEventListener("mousemove", moveRotation);
        renderer.domElement.addEventListener("mouseup", stopRotation);
        renderer.domElement.addEventListener("touchstart", startDrag);
        renderer.domElement.addEventListener("touchmove", moveRotation);
        renderer.domElement.addEventListener("touchend", stopRotation);

        /////////////////////////////
        // Window Resize
        /////////////////////////////

        window.addEventListener("resize", () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
